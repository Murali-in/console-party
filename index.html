    <!-- JSON-LD: FAQPage for AI and Search Engines -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is Eternity Console?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Eternity Console is a free, browser-based multiplayer gaming platform. It turns any screen (TV, laptop, or phone) into a game console and uses smartphones as wireless controllers via QR code — no downloads, apps, or accounts needed."
          }
        },
        {
          "@type": "Question",
          "name": "How do I play games on Eternity Console?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "There are three ways to play: 1) Phone Only — open a game on your phone and play solo with on-screen D-pad and buttons. 2) Laptop + Phone — open Eternity Console on a laptop or TV, scan the QR code with your phone to use it as a controller. 3) Multiplayer — up to 4 players scan the same QR code and each phone becomes a controller."
          }
        },
        {
          "@type": "Question",
          "name": "Do I need to download an app to play?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. Eternity Console runs entirely in the web browser. Just open the website on any device and start playing instantly. No app downloads, no installs, no sign-ups required."
          }
        },
        {
          "@type": "Question",
          "name": "What games are available on Eternity Console?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Eternity Console currently has 3 official games built by the founder Murali: Apex Arena (top-down arena shooter, 1-4 players), Pong (classic paddle game with power-ups, 1-2 players), and Maze Runner (procedural maze race, 1-4 players). Community developers can also submit games."
          }
        },
        {
          "@type": "Question",
          "name": "Who created Eternity Console?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Eternity Console was created by Murali, who serves as the platform's Founder and Admin. Murali also developed all three official games currently on the platform."
          }
        },
        {
          "@type": "Question",
          "name": "Can I contribute my own games to Eternity Console?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes! Developers can submit their games through the Contribute page. Games go through an admin review process. Once approved, the game appears in the library with the developer credited as the contributor."
          }
        },
        {
          "@type": "Question",
          "name": "How does the phone controller work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "When you open Eternity Console on a big screen (TV or laptop), a QR code appears. Players scan this QR with their phone's camera. The phone's browser opens a controller page with a D-pad for movement and action buttons (Fire, Shield, Dash, Melee). The phone communicates with the host screen in real-time over the network."
          }
        },
        {
          "@type": "Question",
          "name": "Is Eternity Console free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, Eternity Console is completely free to play. There are no subscriptions, no in-app purchases, and no hidden fees."
          }
        }
      ]
    }
    </script>
